<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Game</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

canvas{
    border:1px solid white;
}
</style>

</head>
<body>

<canvas id="game"></canvas>

<script>

const CELL_SIZE = 20;
const WIDTH = 20;
const HEIGHT = 20;

const SCREEN_WIDTH = WIDTH * CELL_SIZE;
const SCREEN_HEIGHT = HEIGHT * CELL_SIZE;

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = SCREEN_WIDTH;
canvas.height = SCREEN_HEIGHT;

const GREEN = "#00ff00";
const RED = "#ff0000";
const BLACK = "#000000";
const WHITE = "#ffffff";

let snake = [[10,10]];

let DIR = [0,-1];
let NEXT_DIR = [0,-1];

let score = 0;
let lose = false;

const MOVE_DELAY = 150;
let lastTime = 0;

function eat(){

    while(true){

        const food = [
            Math.floor(Math.random() * WIDTH),
            Math.floor(Math.random() * HEIGHT)
        ];

        let found = false;

        for(let part of snake){

            if(
                part[0] === food[0] &&
                part[1] === food[1]
            ){
                found = true;
                break;
            }
        }

        if(!found){
            return food;
        }
    }
}

let eatt = eat();

function drawGrid(){

    ctx.strokeStyle = WHITE;

    for(let y=0;y<HEIGHT;y++){

        for(let x=0;x<WIDTH;x++){

            ctx.strokeRect(
                x * CELL_SIZE,
                y * CELL_SIZE,
                CELL_SIZE,
                CELL_SIZE
            );
        }
    }
}

function drawSnake(){

    ctx.fillStyle = GREEN;

    for(let part of snake){

        ctx.fillRect(
            part[0] * CELL_SIZE,
            part[1] * CELL_SIZE,
            CELL_SIZE - 1,
            CELL_SIZE - 1
        );
    }
}

function drawFood(){

    ctx.fillStyle = RED;

    ctx.fillRect(
        eatt[0] * CELL_SIZE,
        eatt[1] * CELL_SIZE,
        CELL_SIZE - 1,
        CELL_SIZE - 1
    );
}

function crash(){

    const head = snake[0];

    if(
        head[0] < 0 ||
        head[0] >= WIDTH ||
        head[1] < 0 ||
        head[1] >= HEIGHT
    ){
        return true;
    }

    for(let i=1;i<snake.length;i++){

        if(
            snake[i][0] === head[0] &&
            snake[i][1] === head[1]
        ){
            return true;
        }
    }

    return false;
}

function resetGame(){

    snake = [[10,10]];

    DIR = [0,-1];
    NEXT_DIR = [0,-1];

    score = 0;
    lose = false;

    eatt = eat();
}

function move(){

    const dx = DIR[0];
    const dy = DIR[1];

    const head = snake[0];

    const newHead = [
        head[0] + dx,
        head[1] + dy
    ];

    snake.unshift(newHead);

    if(
        newHead[0] === eatt[0] &&
        newHead[1] === eatt[1]
    ){
        score++;
        eatt = eat();
    }
    else{
        snake.pop();
    }

    if(crash()){
        lose = true;
    }
}

window.addEventListener("keydown", function(event){

    event.preventDefault();

    if(lose){

        if(event.code === "Space"){
            resetGame();
        }

        return;
    }

    if(
        event.code === "ArrowUp" &&
        !(DIR[0] === 0 && DIR[1] === 1)
    ){
        NEXT_DIR = [0,-1];
    }

    else if(
        event.code === "ArrowDown" &&
        !(DIR[0] === 0 && DIR[1] === -1)
    ){
        NEXT_DIR = [0,1];
    }

    else if(
        event.code === "ArrowLeft" &&
        !(DIR[0] === 1 && DIR[1] === 0)
    ){
        NEXT_DIR = [-1,0];
    }

    else if(
        event.code === "ArrowRight" &&
        !(DIR[0] === -1 && DIR[1] === 0)
    ){
        NEXT_DIR = [1,0];
    }

});

function gameLoop(timestamp){

    if(!lose){

        if(timestamp - lastTime >= MOVE_DELAY){

            DIR = [...NEXT_DIR];

            move();

            lastTime = timestamp;
        }
    }

    ctx.fillStyle = BLACK;
    ctx.fillRect(
        0,
        0,
        SCREEN_WIDTH,
        SCREEN_HEIGHT
    );

    drawGrid();
    drawSnake();
    drawFood();

    if(lose){

        ctx.fillStyle = WHITE;
        ctx.font = "30px Arial";

        ctx.fillText(
            "Game Over - SPACE",
            25,
            SCREEN_HEIGHT / 2
        );
    }

    requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

</script>

</body>
</html>
