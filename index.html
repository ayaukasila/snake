<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }
        
        canvas {
            display: block;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: pixelated;
        }
        
        .info {
            display: flex;
            gap: 30px;
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #00ff00;
        }
        
        .score {
            color: #00ff00;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .controls-text {
            color: #70ff70;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 5px;
        }
        
        .mobile-buttons {
            display: none;
            gap: 15px;
            margin-top: 10px;
        }
        
        .arrow-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            color: #00ff00;
            font-size: 30px;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.1s;
            font-weight: bold;
            min-width: 70px;
        }
        
        .arrow-btn:active {
            background: #00ff00;
            color: #000;
            transform: scale(0.95);
        }
        
        @media (max-width: 768px) {
            .mobile-buttons {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .controls-text {
                display: none;
            }
            
            .arrow-btn {
                font-size: 24px;
                padding: 8px 15px;
                min-width: 60px;
            }
        }
        
        .game-over-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #ff0000;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            z-index: 100;
            display: none;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
        }
        
        .game-over-message h2 {
            color: #ff0000;
            font-size: 32px;
        }
        
        .game-over-message p {
            color: #ffffff;
            font-size: 20px;
        }
        
        .restart-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #00ff00;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="info">
            <span>🐍 SNAKE</span>
            <span class="score">SCORE: <span id="scoreValue">0</span></span>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="controls">
            <div class="controls-text">▲ ▼ ◀ ▶  Управление стрелками | Пробел - рестарт</div>
            <div class="mobile-buttons">
                <button class="arrow-btn" data-dir="up">▲</button>
                <button class="arrow-btn" data-dir="down">▼</button>
                <button class="arrow-btn" data-dir="left">◀</button>
                <button class="arrow-btn" data-dir="right">▶</button>
            </div>
        </div>
    </div>
    
    <div class="game-over-message" id="gameOverlay">
        <h2>💀 GAME OVER 💀</h2>
        <p>Твой счёт: <span id="finalScore">0</span></p>
        <button class="restart-btn" id="restartBtn">🔄 НАЧАТЬ ЗАНОВО</button>
    </div>

    <script>
        // ПОДХОД 1 (как в тетрисе) - сначала задаём КОЛИЧЕСТВО клеток
        const WIDTH_CELLS = 20;        // 20 клеток по ширине
        const HEIGHT_CELLS = 20;       // 20 клеток по высоте
        const CELL_SIZE = 30;          // Размер одной клетки в пикселях
        
        // Вычисляем размер окна (как в тетрисе)
        const SCREEN_WIDTH = WIDTH_CELLS * CELL_SIZE;    // 20 * 30 = 600
        const SCREEN_HEIGHT = HEIGHT_CELLS * CELL_SIZE;  // 20 * 30 = 600
        
        // Получаем canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = SCREEN_WIDTH;
        canvas.height = SCREEN_HEIGHT;
        
        // Цвета
        const BLACK = '#000000';
        const GREEN = '#00ff00';
        const RED = '#ff0000';
        const GRAY = '#464646';
        
        // Начальные позиции (используем WIDTH_CELLS и HEIGHT_CELLS)
        let snake = [Math.floor(WIDTH_CELLS / 2), Math.floor(HEIGHT_CELLS / 2)]; // Центр: (10, 10)
        let direction = [1, 0];  // вправо
        let nextDirection = [1, 0];
        
        // Генерация еды
        function generateFood() {
            const maxAttempts = 1000;
            for (let i = 0; i < maxAttempts; i++) {
                const newFood = [
                    Math.floor(Math.random() * WIDTH_CELLS),
                    Math.floor(Math.random() * HEIGHT_CELLS)
                ];
                // Проверяем, не находится ли еда на змейке
                let isOnSnake = false;
                for (let j = 0; j < snake.length; j += 2) {
                    if (snake[j] === newFood[0] && snake[j + 1] === newFood[1]) {
                        isOnSnake = true;
                        break;
                    }
                }
                if (!isOnSnake) {
                    return newFood;
                }
            }
            // Если не нашли свободное место (почти невозможно при 400 клетках)
            for (let y = 0; y < HEIGHT_CELLS; y++) {
                for (let x = 0; x < WIDTH_CELLS; x++) {
                    let isOnSnake = false;
                    for (let j = 0; j < snake.length; j += 2) {
                        if (snake[j] === x && snake[j + 1] === y) {
                            isOnSnake = true;
                            break;
                        }
                    }
                    if (!isOnSnake) {
                        return [x, y];
                    }
                }
            }
            return [0, 0];
        }
        
        let food = generateFood();
        
        // Переменные состояния
        let score = 0;
        let gameOver = false;
        
        // Таймер движения
        const MOVE_DELAY = 200;  // 200 миллисекунд
        let lastMoveTime = 0;
        
        function drawGrid() {
            ctx.strokeStyle = GRAY;
            ctx.lineWidth = 1;
            for (let x = 0; x <= SCREEN_WIDTH; x += CELL_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, SCREEN_HEIGHT);
                ctx.stroke();
            }
            for (let y = 0; y <= SCREEN_HEIGHT; y += CELL_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(SCREEN_WIDTH, y);
                ctx.stroke();
            }
        }
        
        function drawSnake() {
            for (let i = 0; i < snake.length; i += 2) {
                const x = snake[i];
                const y = snake[i + 1];
                ctx.fillStyle = GREEN;
                ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
            }
        }
        
        function drawFood() {
            ctx.fillStyle = RED;
            ctx.fillRect(food[0] * CELL_SIZE, food[1] * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
        }
        
        function checkCollision(headX, headY) {
            // Столкновение с границами (используем WIDTH_CELLS и HEIGHT_CELLS)
            if (headX < 0 || headX >= WIDTH_CELLS || headY < 0 || headY >= HEIGHT_CELLS) {
                return true;
            }
            
            // Столкновение с собой
            for (let i = 0; i < snake.length; i += 2) {
                if (snake[i] === headX && snake[i + 1] === headY) {
                    return true;
                }
            }
            
            return false;
        }
        
        function moveSnake() {
            const dx = direction[0];
            const dy = direction[1];
            const headX = snake[0];
            const headY = snake[1];
            const newHeadX = headX + dx;
            const newHeadY = headY + dy;
            
            // Вставляем новую голову
            snake.unshift(newHeadX);
            snake.unshift(newHeadY);
            
            // Проверяем, съели ли еду
            if (newHeadX === food[0] && newHeadY === food[1]) {
                score++;
                document.getElementById('scoreValue').textContent = score;
                food = generateFood();
            } else {
                // Удаляем хвост (2 элемента)
                snake.pop();
                snake.pop();
            }
        }
        
        function resetGame() {
            snake = [Math.floor(WIDTH_CELLS / 2), Math.floor(HEIGHT_CELLS / 2)];
            direction = [1, 0];
            nextDirection = [1, 0];
            food = generateFood();
            score = 0;
            gameOver = false;
            lastMoveTime = performance.now();
            document.getElementById('scoreValue').textContent = '0';
            document.getElementById('gameOverlay').style.display = 'none';
        }
        
        // Обработка нажатий клавиш
        function handleKeyDown(e) {
            const key = e.key;
            
            if (key === ' ' || key === 'Space') {
                e.preventDefault();
                if (gameOver) {
                    resetGame();
                }
                return;
            }
            
            if (!gameOver) {
                if ((key === 'ArrowUp' || key === 'w' || key === 'W') && !(direction[0] === 0 && direction[1] === 1)) {
                    nextDirection = [0, -1];
                } else if ((key === 'ArrowDown' || key === 's' || key === 'S') && !(direction[0] === 0 && direction[1] === -1)) {
                    nextDirection = [0, 1];
                } else if ((key === 'ArrowLeft' || key === 'a' || key === 'A') && !(direction[0] === 1 && direction[1] === 0)) {
                    nextDirection = [-1, 0];
                } else if ((key === 'ArrowRight' || key === 'd' || key === 'D') && !(direction[0] === -1 && direction[1] === 0)) {
                    nextDirection = [1, 0];
                }
            }
        }
        
        // Мобильные кнопки
        function setupMobileControls() {
            const buttons = document.querySelectorAll('.arrow-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (gameOver) return;
                    
                    const dir = btn.getAttribute('data-dir');
                    if (dir === 'up' && !(direction[0] === 0 && direction[1] === 1)) {
                        nextDirection = [0, -1];
                    } else if (dir === 'down' && !(direction[0] === 0 && direction[1] === -1)) {
                        nextDirection = [0, 1];
                    } else if (dir === 'left' && !(direction[0] === 1 && direction[1] === 0)) {
                        nextDirection = [-1, 0];
                    } else if (dir === 'right' && !(direction[0] === -1 && direction[1] === 0)) {
                        nextDirection = [1, 0];
                    }
                });
            });
        }
        
        // Рендер Game Over overlay
        function showGameOver() {
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverlay').style.display = 'flex';
        }
        
        // Основной игровой цикл
        let animationId = null;
        
        function gameLoop(now) {
            if (!gameOver) {
                // Обновляем направление
                direction = [nextDirection[0], nextDirection[1]];
                
                // Движение по таймеру
                if (now - lastMoveTime >= MOVE_DELAY) {
                    // Сохраняем текущую голову для проверки коллизии
                    const currentHeadX = snake[0];
                    const currentHeadY = snake[1];
                    const dx = direction[0];
                    const dy = direction[1];
                    const newHeadX = currentHeadX + dx;
                    const newHeadY = currentHeadY + dy;
                    
                    // Временно проверяем коллизию без изменения змейки
                    let collision = false;
                    
                    // Проверка границ
                    if (newHeadX < 0 || newHeadX >= WIDTH_CELLS || newHeadY < 0 || newHeadY >= HEIGHT_CELLS) {
                        collision = true;
                    }
                    
                    // Проверка столкновения с собой (кроме случая, когда съели еду)
                    if (!collision) {
                        for (let i = 0; i < snake.length; i += 2) {
                            if (snake[i] === newHeadX && snake[i + 1] === newHeadY) {
                                // Если это не хвост или если мы не съедим еду
                                const willEat = (newHeadX === food[0] && newHeadY === food[1]);
                                if (!willEat || i !== snake.length - 2) {
                                    collision = true;
                                    break;
                                }
                            }
                        }
                    }
                    
                    if (collision) {
                        gameOver = true;
                        showGameOver();
                    } else {
                        moveSnake();
                        lastMoveTime = now;
                    }
                }
            }
            
            // Отрисовка
            ctx.fillStyle = BLACK;
            ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
            
            drawGrid();
            drawSnake();
            drawFood();
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
                ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 30px "Courier New"';
                ctx.shadowBlur = 0;
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ff0000';
                ctx.fillText('GAME OVER', SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2);
                ctx.font = '16px "Courier New"';
                ctx.fillStyle = '#ffffff';
                ctx.fillText('Нажми ПРОБЕЛ', SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2 + 40);
                ctx.textAlign = 'left';
            }
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Инициализация
        function init() {
            resetGame();
            lastMoveTime = performance.now();
            window.addEventListener('keydown', handleKeyDown);
            setupMobileControls();
            
            // Кнопка рестарта
            document.getElementById('restartBtn').addEventListener('click', () => {
                resetGame();
            });
            
            gameLoop(performance.now());
        }
        
        init();
    </script>
</body>
</html>
